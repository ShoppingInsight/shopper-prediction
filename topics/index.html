<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>데이터마이닝 텀프로젝트 - 주제 관리</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="title-block">
        <nav class="page-nav">
          <a href="index.html" class="page-nav-link active">📊 Topics</a>
          <a href="calendar.html" class="page-nav-link">📅 Calendar</a>
        </nav>
        <h1>주제 관리 보드</h1>
        <p class="subtitle">한성대 컴공 데이터마이닝 텀프로젝트 · 후보 주제 비교 및 선정</p>
      </div>
      <div class="actions">
        <button id="btn-add" class="btn btn-primary">+ 새 주제</button>
        <button id="btn-export" class="btn">JSON 내보내기</button>
        <label class="btn">
          JSON 불러오기
          <input type="file" id="file-import" accept="application/json" hidden />
        </label>
        <button id="btn-reset" class="btn btn-ghost">초기화</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="filters">
      <div class="search">
        <input id="search" type="search" placeholder="제목·문제·데이터셋 검색…" />
      </div>
      <div class="filter-group" id="filter-status">
        <button class="chip active" data-value="all">전체</button>
        <button class="chip" data-value="candidate">후보</button>
        <button class="chip" data-value="review">검토중</button>
        <button class="chip" data-value="adopted">채택</button>
        <button class="chip" data-value="rejected">폐기</button>
      </div>
      <div class="filter-group" id="filter-category">
        <button class="chip active" data-value="all">분류·회귀·비지도</button>
        <button class="chip" data-value="classification">분류</button>
        <button class="chip" data-value="regression">회귀</button>
        <button class="chip" data-value="unsupervised">비지도</button>
      </div>
    </section>

    <section id="stats" class="stats"></section>

    <section id="grid" class="grid"></section>

    <p id="empty" class="empty" hidden>조건에 맞는 주제가 없습니다.</p>
  </main>

  <dialog id="editor" class="editor">
    <form method="dialog" id="editor-form">
      <header class="editor-header">
        <h2 id="editor-title">새 주제</h2>
        <button type="button" class="icon-btn" data-close aria-label="닫기">×</button>
      </header>

      <div class="form-grid">
        <label class="field span-2">
          <span>제목</span>
          <input name="title" required maxlength="80" />
        </label>

        <label class="field">
          <span>카테고리</span>
          <select name="category" required>
            <option value="classification">분류</option>
            <option value="regression">회귀</option>
            <option value="unsupervised">비지도</option>
          </select>
        </label>

        <label class="field">
          <span>상태</span>
          <select name="status" required>
            <option value="candidate">후보</option>
            <option value="review">검토중</option>
            <option value="adopted">채택</option>
            <option value="rejected">폐기</option>
          </select>
        </label>

        <label class="field span-2">
          <span>문제 정의</span>
          <textarea name="problem" rows="2" required></textarea>
        </label>

        <label class="field span-2">
          <span>데이터셋 출처</span>
          <input name="dataset" />
        </label>

        <label class="field span-2">
          <span>적용 모델 (쉼표 구분, 3개 이상 권장)</span>
          <input name="models" placeholder="예: 선형 회귀, Ridge, Random Forest" />
        </label>

        <label class="field">
          <span>장점 (줄바꿈 구분)</span>
          <textarea name="pros" rows="3"></textarea>
        </label>

        <label class="field">
          <span>단점 (줄바꿈 구분)</span>
          <textarea name="cons" rows="3"></textarea>
        </label>

        <label class="field">
          <span>담당자</span>
          <input name="owner" />
        </label>

        <label class="field">
          <span>메모</span>
          <input name="notes" />
        </label>
      </div>

      <footer class="editor-footer">
        <button type="button" class="btn btn-ghost" data-delete hidden>삭제</button>
        <div class="spacer"></div>
        <button type="button" class="btn" data-close>취소</button>
        <button type="submit" class="btn btn-primary">저장</button>
      </footer>
    </form>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
